<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>질문리스트</title>
    <style>
        table, th, td {
            border: 1px solid gray;
            border-collapse: collapse;
            padding: 4px 8px;
        }
    </style>
</head>
<body>
    <table>
        <thead>
        <tr>
            <th>제목</th>
            <th>작성일시</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="question : ${questionList}">
            <td>
                <a th:href="@{|/question/detail/${question.id}|}"
                th:text="${question.subject}">
                </a>
            </td>
            <td th:text="${question.createDate}"></td>
        </tr>
        </tbody>
    </table>
</body>
</html>
